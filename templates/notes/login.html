{% extends 'notes/base.html' %}
{% load static %}

{% block title %}Login - Notes{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="card">
        <div class="text-center mb-3">
            <div class="auth-icon">
                <i class="bi bi-journal-text"></i>
            </div>
            <h4>Welcome Back</h4>
            <p class="text-muted" style="font-size:0.9rem;">Sign in to your notes</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text-secondary);">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username" id="username" class="form-control"
                           placeholder="Enter your username" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="background-color: var(--input-bg); border-color: var(--input-border); color: var(--text-secondary);">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" name="password" id="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>

            <p class="text-center text-muted mb-0" style="font-size:0.9rem;">
                Don't have an account? <a href="{% url 'register' %}">Create one</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
