{% extends 'notes/base.html' %}
{% load static %}

{% block title %}Delete Note{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card text-center">
            <div class="card-body p-5">
                <div class="mb-4" style="font-size:3rem; color: var(--danger);">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <h5 class="fw-bold mb-2">Delete Note?</h5>
                <p class="text-muted mb-1" style="font-size:0.95rem;">
                    Are you sure you want to delete this note?
                </p>
                <p class="fw-semibold mb-4" style="font-size:1.1rem; color: var(--text-color);">
                    "{{ note.title }}"
                </p>
                <p class="text-muted mb-4" style="font-size:0.85rem;">
                    <i class="bi bi-info-circle me-1"></i>This action cannot be undone.
                </p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-1"></i> Yes, Delete
                        </button>
                        <a href="{% url 'note_list' %}" class="btn btn-outline-secondary px-4"
                           style="color: var(--text-secondary); border-color: var(--border-color);">
                            <i class="bi bi-x-lg me-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
