{% extends 'notes/base.html' %}
{% load static %}

{% block title %}Add Tag{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-plus-circle me-2"></i>Add Tag
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label" for="id_name">Tag Name</label>
                        {{ form.name }}
                        {% if form.name.errors %}
                        <div class="text-danger" style="font-size:0.85rem; margin-top:4px;">{{ form.name.errors.0 }}</div>
                        {% endif %}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i> Save Tag
                        </button>
                        <a href="{% url 'tag_list' %}" class="btn btn-outline-secondary"
                           style="color: var(--text-secondary); border-color: var(--border-color);">
                            <i class="bi bi-x-lg me-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
